<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIWARE Smart Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        header { background-color: #333; color: white; padding: 1rem; text-align: center; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0; }
        .status { padding: 1rem; margin-top: 1rem; border-radius: 4px; }
        .status.ok { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <header>
        <h1>FIWARE Smart Store</h1>
    </header>
    <div class="container">
        <div class="card">
            <h2>System Health</h2>
            <div id="orion-status" class="status">Checking Orion Context Broker...</div>
        </div>
    </div>
    <script>
        async function checkHealth() {
            const statusDiv = document.getElementById('orion-status');
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.status === 'ok') {
                    statusDiv.className = 'status ok';
                    statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Orion Connected successfully!';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error connecting to Orion.';
                }
            } catch (e) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> Backend unreachable.';
            }
        }
        checkHealth();
    </script>
</body>
</html>
